<script>
    let loadedBooks = [];
    const gallery = document.getElementById('gallery');
    const loadingScreen = document.getElementById('loadingIndicator');
    const searchInput = document.getElementById('searchInput');
    const stats = document.getElementById('stats');
    const noResults = document.getElementById('noResults');

    // Inicializar app
    window.addEventListener('DOMContentLoaded', startCatalog);

    async function startCatalog() {
        try {
            // 1. Cargamos el archivo JSON local
            const response = await fetch('biblioteca.json');
            if (!response.ok) throw new Error("No se pudo cargar el archivo JSON");
            
            const data = await response.json();
            
            // 2. Procesamos los datos para que sean compatibles con tu buscador
            loadedBooks = data.map(book => ({
                ...book,
                // Creamos un string de búsqueda fácil
                searchString: `${book.titulo} ${book.autores.join(' ')}`.toLowerCase()
            }));

            // 3. Renderizamos todo
            renderGallery(loadedBooks);
            
            // 4. Actualizamos UI
            loadingScreen.classList.add('hidden');
            stats.innerText = `Libros: ${loadedBooks.length}`;
            stats.classList.replace('bg-blue-50', 'bg-green-50');
            stats.classList.replace('text-blue-600', 'text-green-600');

        } catch (error) {
            console.error("Error al iniciar el catálogo:", error);
            document.getElementById('loadingStatus').innerText = "Error al cargar biblioteca.json. Asegurate de que el archivo esté en la misma carpeta.";
        }
    }

    function renderGallery(books) {
        gallery.innerHTML = '';
        books.forEach(book => renderBook(book));
    }

    function renderBook(book) {
        const coverUrl = book.portada !== "Sin imagen" ? book.portada : 'https://via.placeholder.com/180x260?text=Sin+Portada';
        const authors = book.autores.join(', ');

        const card = document.createElement('div');
        card.className = 'book-card bg-white p-3 rounded-2xl shadow-sm cursor-pointer border border-gray-100 flex flex-col';
        card.innerHTML = `
            <div class="aspect-[2/3] overflow-hidden rounded-xl bg-gray-50 mb-4">
                <img src="${coverUrl}" alt="${book.titulo}" class="w-full h-full object-cover" loading="lazy">
            </div>
            <h3 class="text-sm font-bold text-gray-800 line-clamp-2 leading-tight mb-1 grow">${book.titulo}</h3>
            <p class="text-[11px] text-gray-500 truncate uppercase tracking-tight font-medium">${authors}</p>
        `;
        
        card.onclick = () => showDetails(book);
        gallery.appendChild(card);
    }

    // Buscador optimizado
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        const filtered = loadedBooks.filter(b => b.searchString.includes(term));
        
        // Renderizamos solo los filtrados
        renderGallery(filtered);

        // Mostrar/Ocultar mensaje de "no hay resultados"
        noResults.classList.toggle('hidden', filtered.length > 0 || term === '');
    });

    function showDetails(book) {
        const coverUrl = book.portada !== "Sin imagen" ? book.portada : 'https://via.placeholder.com/400x600?text=Sin+Portada';
        const authors = book.autores.join(', ');

        document.getElementById('modalContent').innerHTML = `
            <div class="flex flex-col md:flex-row gap-10">
                <div class="w-full md:w-5/12">
                    <img src="${coverUrl}" class="w-full rounded-2xl shadow-2xl border border-gray-100">
                </div>
                <div class="w-full md:w-7/12 py-2">
                    <div class="mb-6">
                        <h2 class="text-3xl font-extrabold text-gray-900 leading-tight mb-3">${book.titulo}</h2>
                        <p class="text-xl text-blue-600 font-semibold italic">${authors}</p>
                    </div>
                    
                    <div class="grid grid-cols-1 gap-5">
                        <div class="bg-gray-50 p-4 rounded-2xl">
                            <span class="block text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1">ISBN</span>
                            <span class="text-gray-800 font-mono text-sm tracking-tighter">${book.isbn}</span>
                        </div>
                    </div>

                    <div class="mt-10">
                        <a href="https://www.google.com/search?q=libro+${encodeURIComponent(book.titulo)}+${encodeURIComponent(authors[0])}" target="_blank" class="w-full text-center inline-block bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-gray-800 transition-all shadow-lg hover:shadow-xl transform active:scale-95">
                            Buscar más información
                        </a>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('bookModal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('bookModal').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }

    window.onclick = (e) => {
        if (e.target === document.getElementById('bookModal')) closeModal();
    };
</script>
