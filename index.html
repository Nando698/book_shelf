<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Catálogo Personal de Libros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .book-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- Header & Search -->
    <header class="bg-white shadow-sm sticky top-0 z-20">
        <div class="max-w-6xl mx-auto px-4 py-4 md:py-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl font-bold text-gray-800">📚 Mi Catálogo</h1>
                
                <div class="relative w-full md:w-96">
                    <input type="text" id="searchInput" placeholder="Buscar por título o autor..." 
                           class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                    <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>

                <div id="stats" class="text-xs font-semibold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100">
                    Iniciando...
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Loader Screen -->
        <div id="loadingIndicator" class="flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-4"></div>
            <p id="loadingStatus" class="text-gray-500 text-sm">Cargando colección...</p>
        </div>

        <!-- Gallery -->
        <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- Dinámico -->
        </div>

        <!-- Empty State Search -->
        <div id="noResults" class="hidden text-center py-20">
            <p class="text-gray-400 text-lg">No se encontraron libros que coincidan con tu búsqueda.</p>
        </div>
    </main>

    <!-- Modal -->
    <div id="bookModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 p-2 bg-gray-100 rounded-full text-gray-500 hover:text-gray-800 transition-colors z-10">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div id="modalContent" class="p-6 md:p-10"></div>
        </div>
    </div>

    <script>
        // Lista de ISBNs extraídos de la imagen
        const ISBN_DATA = [
            "9788416213825", "9786073101493", "9789686941722", "9780764979873", "9789504914723",

            "9789500399043", "9789876700351", "9782711836550", "9788476098707", "9788419089052",
            "9788420470566", "9789877381887", "9781984822185", "9789874159427", "9789509009059",
            "9788433972811", "9788433980397", "9788483831441", "9789500729314", "9786078667291",
            "9783836507752", "9789871544394", "9789505576289", "9788419243324", "9788476694701",
            "9788488730022", "9789871768011", "9788433967664", "9788417007584", "9788433972216",
            "9789871177219", "9789876092104", "9788433914835", "9789871920976", "9789877382570",
            "9789870731033", "9788433914828", "9788426316387", "9789875001053", "9789507426511",
            "9789507542673", "9788433931580", "9788477651604", "9788433980229", "9786316598066",
            "9789871081332", "9789878000565", "40259182221759"
        ];

        let loadedBooks = [];
        const gallery = document.getElementById('gallery');
        const loadingScreen = document.getElementById('loadingIndicator');
        const searchInput = document.getElementById('searchInput');
        const stats = document.getElementById('stats');
        const noResults = document.getElementById('noResults');

        // Inicializar app
        window.addEventListener('DOMContentLoaded', startCatalog);

        async function startCatalog() {
            stats.innerText = `Cargando 0 de ${ISBN_DATA.length}`;
            
            // Procesar en bloques para no saturar el navegador pero permitir vista rápida
            const batchSize = 10;
            for (let i = 0; i < ISBN_DATA.length; i += batchSize) {
                const batch = ISBN_DATA.slice(i, i + batchSize);
                await Promise.all(batch.map(isbn => fetchBook(isbn)));
                
                // Ocultar loader una vez que tenemos los primeros libros
                if (i === 0) {
                    loadingScreen.classList.add('hidden');
                    gallery.classList.remove('hidden');
                }
                
                stats.innerText = `Libros: ${loadedBooks.length} / ${ISBN_DATA.length}`;
            }
            stats.classList.replace('bg-blue-50', 'bg-green-50');
            stats.classList.replace('text-blue-600', 'text-green-600');
        }

        async function fetchBook(isbn) {
    try {
        const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&key=AIzaSyAolcX8ulJIMWy_Od6eXPTGOPDRmQt9siM`);
        const data = await response.json();

        if (data.totalItems > 0) {
            const info = data.items[0].volumeInfo;

            const book = {
                isbn: isbn,
                title: info.title || "Sin título",
                authors: info.authors || [],
                publishers: info.publisher ? [info.publisher] : [],
                publish_date: info.publishedDate || "",
                description: info.description || "",
                cover: {
                    medium: info.imageLinks?.thumbnail || "",
                    large: info.imageLinks?.thumbnail || ""
                },
                url: info.infoLink || "",
                searchString: `${info.title || ""} ${(info.authors || []).join(" ")}`.toLowerCase()
            };

            loadedBooks.push(book);
            renderBook(book);
        }

    } catch (error) {
        console.warn(`Error con ISBN ${isbn}:`, error);
    }
}

        function renderBook(book) {
            const coverUrl = book.cover ? book.cover.medium : 'https://via.placeholder.com/180x260?text=Sin+Portada';
            const authors = book.authors ? book.authors.map(a => a.name).join(', ') : 'Autor desconocido';

            const card = document.createElement('div');
            card.className = 'book-card bg-white p-3 rounded-2xl shadow-sm cursor-pointer border border-gray-100 flex flex-col';
            card.dataset.isbn = book.isbn;
            card.innerHTML = `
                <div class="aspect-[2/3] overflow-hidden rounded-xl bg-gray-50 mb-4">
                    <img src="${coverUrl}" alt="${book.title}" class="w-full h-full object-cover" loading="lazy">
                </div>
                <h3 class="text-sm font-bold text-gray-800 line-clamp-2 leading-tight mb-1 grow">${book.title}</h3>
                <p class="text-[11px] text-gray-500 truncate uppercase tracking-tight font-medium">${authors}</p>
            `;
            
            card.onclick = () => showDetails(book);
            gallery.appendChild(card);
        }

        // Buscador en tiempo real
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            let visibleCount = 0;

            document.querySelectorAll('.book-card').forEach(card => {
                const isbn = card.dataset.isbn;
                const book = loadedBooks.find(b => b.isbn === isbn);
                
                if (book && book.searchString.includes(term)) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });

            noResults.classList.toggle('hidden', visibleCount > 0 || term === '');
        });

        function showDetails(book) {
            const coverUrl = book.cover ? book.cover.large : 'https://via.placeholder.com/400x600?text=Sin+Portada';
            const authors = book.authors ? book.authors.map(a => a.name).join(', ') : 'Autor desconocido';
            const publishers = book.publishers ? book.publishers.map(p => p.name).join(', ') : 'Información no disponible';

            document.getElementById('modalContent').innerHTML = `
                <div class="flex flex-col md:flex-row gap-10">
                    <div class="w-full md:w-5/12">
                        <img src="${coverUrl}" class="w-full rounded-2xl shadow-2xl border border-gray-100">
                    </div>
                    <div class="w-full md:w-7/12 py-2">
                        <div class="mb-6">
                            <h2 class="text-3xl font-extrabold text-gray-900 leading-tight mb-3">${book.title}</h2>
                            <p class="text-xl text-blue-600 font-semibold italic">${authors}</p>
                        </div>
                        
                        <div class="grid grid-cols-1 gap-5">
                            <div class="bg-gray-50 p-4 rounded-2xl">
                                <span class="block text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1">Editorial</span>
                                <span class="text-gray-800 font-medium">${publishers}</span>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl">
                                <span class="block text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1">Año de edición</span>
                                <span class="text-gray-800 font-medium">${book.publish_date || 'N/A'}</span>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl">
                                <span class="block text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1">ISBN</span>
                                <span class="text-gray-800 font-mono text-sm tracking-tighter">${book.isbn}</span>
                            </div>
                        </div>

                        <div class="mt-10">
                            <a href="${book.url}" target="_blank" class="w-full text-center inline-block bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-gray-800 transition-all shadow-lg hover:shadow-xl transform active:scale-95">
                                Ver en Open Library
                            </a>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('bookModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('bookModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.onclick = (e) => {
            if (e.target === document.getElementById('bookModal')) closeModal();
        };
    </script>
</body>
</html>
