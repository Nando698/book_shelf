<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISBN Book Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería para leer archivos Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .book-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-gray-800">📚 Mi Biblioteca ISBN</h1>
            
            <div class="flex items-center gap-3">
                <label class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg cursor-pointer transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Cargar Excel
                    <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden">
                </label>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Estado Inicial / Instrucciones -->
        <div id="initialState" class="text-center py-20 bg-white rounded-2xl border-2 border-dashed border-gray-200">
            <div class="mb-4 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
            <h2 class="text-xl font-medium text-gray-700">Selecciona un archivo Excel para comenzar</h2>
            <p class="text-gray-500 mt-2">La columna A debe contener los códigos ISBN</p>
        </div>

        <!-- Loader -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p id="loadingStatus" class="text-gray-600 font-medium">Procesando ISBNs...</p>
        </div>

        <!-- Galería de Libros -->
        <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- Los libros se insertarán aquí dinámicamente -->
        </div>
    </main>

    <!-- Modal de Detalles -->
    <div id="bookModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative p-6 md:p-8">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div id="modalContent" class="flex flex-col md:flex-row gap-8">
                <!-- Se rellena dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        const excelInput = document.getElementById('excelInput');
        const initialState = document.getElementById('initialState');
        const loading = document.getElementById('loading');
        const loadingStatus = document.getElementById('loadingStatus');
        const gallery = document.getElementById('gallery');
        const bookModal = document.getElementById('bookModal');
        const modalContent = document.getElementById('modalContent');

        let booksData = [];

        excelInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // Convertir a JSON
                const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                // Extraer ISBNs de la Columna A (ignorando vacíos y encabezados si no son números)
                const isbns = json
                    .map(row => String(row[0]).trim())
                    .filter(val => val && val !== 'undefined' && val.match(/[0-9xX]{10,13}/));

                if (isbns.length > 0) {
                    processISBNs(isbns);
                } else {
                    alert('No se encontraron códigos ISBN válidos en la Columna A');
                }
            };
            reader.readAsBinaryString(file);
        }

        async function processISBNs(isbns) {
            initialState.classList.add('hidden');
            gallery.classList.add('hidden');
            loading.classList.remove('hidden');
            gallery.innerHTML = '';
            booksData = [];

            let count = 0;
            for (const isbn of isbns) {
                count++;
                loadingStatus.innerText = `Buscando libro ${count} de ${isbns.length}...`;
                
                try {
                    const response = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
                    const data = await response.json();
                    const key = `ISBN:${isbn}`;

                    if (data[key]) {
                        const book = data[key];
                        booksData.push(book);
                        renderBookThumbnail(book);
                    }
                } catch (error) {
                    console.error(`Error con ISBN ${isbn}:`, error);
                }
            }

            loading.classList.add('hidden');
            gallery.classList.remove('hidden');
            
            if (booksData.length === 0) {
                initialState.classList.remove('hidden');
                alert('No se pudo encontrar información para los ISBNs proporcionados.');
            }
        }

        function renderBookThumbnail(book) {
            const coverUrl = book.cover ? book.cover.medium : 'https://via.placeholder.com/180x260?text=Sin+Portada';
            const authors = book.authors ? book.authors.map(a => a.name).join(', ') : 'Autor desconocido';

            const card = document.createElement('div');
            card.className = 'book-card bg-white p-2 rounded-xl shadow-sm cursor-pointer';
            card.innerHTML = `
                <div class="aspect-[2/3] overflow-hidden rounded-lg bg-gray-100 mb-3">
                    <img src="${coverUrl}" alt="${book.title}" class="w-full h-full object-cover">
                </div>
                <h3 class="text-sm font-bold text-gray-800 line-clamp-2 leading-tight">${book.title}</h3>
                <p class="text-xs text-gray-500 mt-1 truncate">${authors}</p>
            `;
            
            card.onclick = () => showDetails(book);
            gallery.appendChild(card);
        }

        function showDetails(book) {
            const coverUrl = book.cover ? book.cover.large : 'https://via.placeholder.com/300x450?text=Sin+Portada';
            const authors = book.authors ? book.authors.map(a => a.name).join(', ') : 'Autor desconocido';
            const publishers = book.publishers ? book.publishers.map(p => p.name).join(', ') : 'N/A';
            const pages = book.number_of_pages ? `${book.number_of_pages} páginas` : 'Páginas no especificadas';

            modalContent.innerHTML = `
                <div class="w-full md:w-1/3 flex-shrink-0">
                    <img src="${coverUrl}" alt="${book.title}" class="w-full rounded-xl shadow-lg">
                </div>
                <div class="w-full md:w-2/3">
                    <h2 class="text-3xl font-bold text-gray-900 mb-2 leading-tight">${book.title}</h2>
                    <p class="text-xl text-blue-600 font-medium mb-6">${authors}</p>
                    
                    <div class="grid grid-cols-1 gap-4 text-sm text-gray-600">
                        <div class="flex flex-col border-b border-gray-100 pb-2">
                            <span class="font-bold text-gray-400 uppercase tracking-wider text-[10px]">Publicado por</span>
                            <span class="text-gray-800 text-base">${publishers}</span>
                        </div>
                        <div class="flex flex-col border-b border-gray-100 pb-2">
                            <span class="font-bold text-gray-400 uppercase tracking-wider text-[10px]">Año de publicación</span>
                            <span class="text-gray-800 text-base">${book.publish_date || 'Desconocido'}</span>
                        </div>
                        <div class="flex flex-col border-b border-gray-100 pb-2">
                            <span class="font-bold text-gray-400 uppercase tracking-wider text-[10px]">Identificadores</span>
                            <span class="text-gray-800 font-mono text-sm">${Object.entries(book.identifiers).map(([k,v]) => `${k.toUpperCase()}: ${v[0]}`).join(' | ')}</span>
                        </div>
                    </div>

                    <div class="mt-8 flex gap-4">
                        <a href="${book.url}" target="_blank" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors inline-block">
                            Ver en Open Library
                        </a>
                    </div>
                </div>
            `;
            bookModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            bookModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Cerrar modal al hacer clic fuera
        bookModal.onclick = (e) => {
            if (e.target === bookModal) closeModal();
        };
    </script>
</body>
</html>
